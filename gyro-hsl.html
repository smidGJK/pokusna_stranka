<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plynulé HSL světlo</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    background: hsl(0, 100%, 50%);
    transition: background 0.15s linear;
    overflow: hidden;
  }

  #startButton {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 20px;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    border: none;
    cursor: pointer;
  }
</style>
</head>
<body>

<button id="startButton">Spustit světlo</button>

<script>
const btn = document.getElementById("startButton");

function normalize(value, min, max) {
  return Math.min(Math.max((value - min) / (max - min), 0), 1);
}

function startExperience() {

  // fullscreen
  document.documentElement.requestFullscreen().catch(()=>{});

  // povolení gyroskopu (iOS)
  if (typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function") {
    DeviceOrientationEvent.requestPermission()
      .then(response => {
        if (response === "granted") initGyro();
      })
      .catch(console.error);
  } else {
    initGyro();
  }

  btn.remove();
}

function initGyro() {

  let smoothH = 0;
  let smoothS = 1;
  let smoothL = 0.5;

  window.addEventListener("deviceorientation", (event) => {

    // Osy
    let leftRight = event.gamma;   // saturace
    let frontBack = event.beta;    // světlost
    let rotate = event.alpha;      // hue

    // Normalizace
    let targetH = rotate || 0; // 0–360
    let targetS = normalize(leftRight, -90, 90);
    let targetL = normalize(frontBack, -180, 180);

    // Jemné vyhlazení (interpolace)
    smoothH += (targetH - smoothH) * 0.05;
    smoothS += (targetS - smoothS) * 0.05;
    smoothL += (targetL - smoothL) * 0.05;

    document.body.style.background =
      `hsl(${smoothH}, ${smoothS * 100}%, ${smoothL * 100}%)`;
  });
}

btn.addEventListener("click", startExperience);
</script>

</body>
</html>
