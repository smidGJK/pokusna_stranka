<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plynulé HSL světlo</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: hsl(0, 100%, 50%);
    transition: background 0.15s linear;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  #panel {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(5px);
    padding: 12px 18px;
    border-radius: 12px;
    display: flex;
    gap: 10px;
    transition: opacity 0.3s ease;
  }

  #panel.hidden {
    opacity: 0;
    pointer-events: none;
  }

  button {
    padding: 8px 14px;
    font-size: 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
</style>
</head>

<body>

<div id="panel">
  <button id="gyroBtn">Aktivovat gyroskop</button>
  <button id="fsBtn">Na celou obrazovku</button>
</div>

<script>
const panel = document.getElementById("panel");
const gyroBtn = document.getElementById("gyroBtn");
const fsBtn = document.getElementById("fsBtn");

let gyroActive = false;

function normalize(value, min, max) {
  return Math.min(Math.max((value - min) / (max - min), 0), 1);
}

function initGyro() {
  if (gyroActive) return;
  gyroActive = true;

  let smoothH = 0;
  let smoothS = 1;
  let smoothL = 0.5;

  window.addEventListener("deviceorientation", (event) => {

    if (event.alpha === null) return; // ochrana

    let leftRight = event.gamma || 0;   // Saturation
    let frontBack = event.beta || 0;    // Lightness
    let rotate = event.alpha || 0;      // Hue

    let targetH = rotate; // 0–360
    let targetS = normalize(leftRight, -90, 90);
    let targetL = normalize(frontBack, -180, 180);

    // Vyhlazení
    smoothH += (targetH - smoothH) * 0.05;
    smoothS += (targetS - smoothS) * 0.05;
    smoothL += (targetL - smoothL) * 0.05;

    document.body.style.background =
      `hsl(${smoothH}, ${smoothS * 100}%, 100%)`;
  });
}

gyroBtn.addEventListener("click", () => {

  // iOS vyžaduje explicitní povolení
  if (typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function") {

    DeviceOrientationEvent.requestPermission()
      .then(response => {
        if (response === "granted") {
          initGyro();
        }
      })
      .catch(console.error);

  } else {
    initGyro();
  }
});

fsBtn.addEventListener("click", () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(()=>{});
    panel.classList.add("hidden");
  } else {
    document.exitFullscreen();
    panel.classList.remove("hidden");
  }
});

// klepnutí kdekoliv zobrazí panel
document.body.addEventListener("click", (e) => {
  if (document.fullscreenElement) {
    panel.classList.remove("hidden");
  }
});
</script>

</body>
</html>
