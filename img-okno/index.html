<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtuální okno 2,046 m</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    height: 100vh;
    background: black;
  }

  #world {
    position: absolute;
    width: 2046px;     /* 2× 1023 */
    height: 1446px;    /* 2× 723 */
    background-image: url("kantori_20_21.png");
    background-size: 1023px 723px;
    background-repeat: repeat;
  }

  #panel {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.5);
    padding: 10px 16px;
    border-radius: 12px;
    display: flex;
    gap: 10px;
    color: white;
    font-family: Arial, sans-serif;
  }

  button {
    padding: 6px 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  #panel.hidden {
    opacity: 0;
    pointer-events: none;
  }
</style>
</head>

<body>

<div id="world"></div>

<div id="panel">
  <button id="motionBtn">Aktivovat pohyb</button>
  <button id="fsBtn">Na celou obrazovku</button>
</div>

<script>
const world = document.getElementById("world");
const panel = document.getElementById("panel");

let posX = -500;
let posY = -300;

let velX = 0;
let velY = 0;

const friction = 0.95;
const sensitivity = 0.8;
const centerPull = 0.002;  // vrací zpět proti driftu

function animate() {

  velX *= friction;
  velY *= friction;

  // jemné vracení proti driftu
  velX -= posX * centerPull;
  velY -= posY * centerPull;

  posX += velX;
  posY += velY;

  world.style.transform =
    `translate(${posX}px, ${posY}px)`;

  requestAnimationFrame(animate);
}

function initMotion() {

  window.addEventListener("devicemotion", (event) => {

    const acc = event.accelerationIncludingGravity;
    if (!acc) return;

    let ax = acc.x || 0;
    let ay = acc.y || 0;

    velX += ax * sensitivity;
    velY -= ay * sensitivity;
  });
}

document.getElementById("motionBtn").addEventListener("click", () => {

  if (typeof DeviceMotionEvent !== "undefined" &&
      typeof DeviceMotionEvent.requestPermission === "function") {

    DeviceMotionEvent.requestPermission()
      .then(response => {
        if (response === "granted") {
          initMotion();
        }
      });

  } else {
    initMotion();
  }
});

document.getElementById("fsBtn").addEventListener("click", () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
    panel.classList.add("hidden");
  } else {
    document.exitFullscreen();
    panel.classList.remove("hidden");
  }
});

document.body.addEventListener("click", () => {
  if (document.fullscreenElement) {
    panel.classList.remove("hidden");
  }
});

animate();
</script>

</body>
</html>
