<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fyzický posun obrazu</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    height: 100vh;
    background: black;
  }

  #world {
    position: absolute;
    width: 1023px;
    height: 723px;
    background-image: url("kantori_20_21.png"); /* nahraď */
    background-size: cover;
  }

  #panel {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.5);
    padding: 10px 16px;
    border-radius: 12px;
    display: flex;
    gap: 10px;
    color: white;
    font-family: Arial, sans-serif;
  }

  button {
    padding: 6px 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  #panel.hidden {
    opacity: 0;
    pointer-events: none;
  }
</style>
</head>

<body>

<div id="world"></div>

<div id="panel">
  <button id="motionBtn">Aktivovat pohyb</button>
  <button id="fsBtn">Na celou obrazovku</button>
</div>

<script>
const world = document.getElementById("world");
const panel = document.getElementById("panel");
const motionBtn = document.getElementById("motionBtn");
const fsBtn = document.getElementById("fsBtn");

let posX = 0;
let posY = 0;
let velX = 0;
let velY = 0;

const friction = 0.92;
const sensitivity = 0.5;
const deadZone = 0.1;

function update() {
  velX *= friction;
  velY *= friction;

  posX += velX;
  posY += velY;

  // omezení na hranice obrázku
  const maxX = window.innerWidth - 1023;
  const maxY = window.innerHeight - 723;

  posX = Math.min(0, Math.max(maxX, posX));
  posY = Math.min(0, Math.max(maxY, posY));

  world.style.transform = `translate(${posX}px, ${posY}px)`;

  requestAnimationFrame(update);
}

function initMotion() {
  window.addEventListener("devicemotion", (event) => {

    let ax = event.acceleration.x || 0;
    let ay = event.acceleration.y || 0;

    if (Math.abs(ax) < deadZone) ax = 0;
    if (Math.abs(ay) < deadZone) ay = 0;

    velX += ax * sensitivity;
    velY -= ay * sensitivity; // obrácení osy
  });
}

motionBtn.addEventListener("click", () => {

  if (typeof DeviceMotionEvent !== "undefined" &&
      typeof DeviceMotionEvent.requestPermission === "function") {

    DeviceMotionEvent.requestPermission()
      .then(response => {
        if (response === "granted") {
          initMotion();
        }
      })
      .catch(console.error);

  } else {
    initMotion();
  }
});

fsBtn.addEventListener("click", () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(()=>{});
    panel.classList.add("hidden");
  } else {
    document.exitFullscreen();
    panel.classList.remove("hidden");
  }
});

document.body.addEventListener("click", () => {
  if (document.fullscreenElement) {
    panel.classList.remove("hidden");
  }
});

update();
</script>

</body>
</html>
